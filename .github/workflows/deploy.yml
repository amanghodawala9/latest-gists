name: Build and Deploy Angular App to GitHub Pages

on:
  push:
    branches:
      - master  # or 'master', depending on your default branch

permissions:
  contents: write # Allows the action to push to the gh-pages branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Use a recent LTS version

      - name: Install dependencies
        run: npm ci

      - name: Deploy to GitHub Pages
        run: |
          git config --global user.email "amanghodawala9@gmail.com"
          git config --global user.name "amanghodawala9"
          npm install -g angular-cli-ghpages @angular/cli
          ng add angular-cli-ghpages --skip-confirmation
          ng deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
