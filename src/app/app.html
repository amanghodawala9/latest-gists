<div class="header">
  <h1 class="title">Latest Gists From Github</h1>
  <button class="load-button" (click)="loadmore()">Load more</button>
</div>
<div class="container">
@for (gist of latestGists(); track gist.id) {
  <div class="card" (click)="showGist($index)">
    <h4>{{gist.owner.login}}</h4>
    <img src="{{gist.owner.avatar_url}}" width="256px" height="256px"/>
    <div>{{gist.created_at | date:'yyyy-MM-dd hh:mm:ss'}}</div>
    <p>{{gist.description}}</p>
  </div>
}
</div>
